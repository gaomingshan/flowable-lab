server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://192.168.179.128:3306/flowable?useSSL=false&serverTimezone=Asia/Shanghai&nullCatalogMeansCurrent=true&allowPublicKeyRetrieval=true&characterEncoding=utf8&createDatabaseIfNotExist=true
    username: app_user
    password: app_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

flowable:
  database-schema-update: true
  async-executor-activate: true
  history-level: full
  process:
    history-level: full
  idm:
    enabled: true
  dmn:
    enabled: true
  cmmn:
    enabled: true

logging:
  level:
    com.flowable: debug
    org.flowable: info

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
